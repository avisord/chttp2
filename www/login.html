<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
background:
  radial-gradient(circle at 20% 20%, #1e293b 0%, transparent 40%),
  radial-gradient(circle at 80% 80%, #312e81 0%, transparent 40%),
  #020617;
color:white;
}

.wrapper{
display:flex;
gap:28px;
align-items:flex-start;
width:100%;
max-width:820px;
}

.card{
flex:0 0 360px;
padding:36px;
border-radius:14px;
background:rgba(30,41,59,0.8);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.07);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

h1{text-align:center;margin-bottom:28px;font-size:22px;font-weight:700;}

input{
width:100%;
padding:12px 14px;
border-radius:8px;
border:1px solid #334155;
background:#0f172a;
color:white;
font-size:14px;
margin-bottom:14px;
outline:none;
transition:border-color .15s,box-shadow .15s;
}
input:focus{border-color:#6366f1;box-shadow:0 0 0 2px rgba(99,102,241,.25);}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
font-weight:600;
font-size:15px;
cursor:pointer;
transition:background .15s;
}
.btn:hover{background:#4f46e5;}
.btn:disabled{background:#3730a3;cursor:default;opacity:.7;}

.msg{margin-top:12px;font-size:13px;text-align:center;min-height:20px;}
.msg.error{color:#f87171;}
.msg.ok{color:#4ade80;}

/* Sessions panel */
.sessions-panel{
flex:1;
padding:28px;
border-radius:14px;
background:rgba(30,41,59,0.8);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.07);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
min-width:0;
}

.panel-title{font-size:13px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;}

.session{
display:flex;
align-items:center;
gap:12px;
padding:12px;
border-radius:9px;
background:#0f172a;
border:1px solid #1e293b;
margin-bottom:10px;
transition:border-color .15s;
}
.session:hover{border-color:#6366f1;}

.avatar{
width:38px;height:38px;
border-radius:50%;
background:#1e3a5f;
color:#60a5fa;
font-weight:700;
font-size:16px;
display:flex;align-items:center;justify-content:center;
flex-shrink:0;
}

.session-info{flex:1;min-width:0;}
.session-user{font-weight:600;font-size:14px;}
.session-times{font-size:11px;color:#64748b;margin-top:3px;}

.session-btns{display:flex;gap:7px;flex-shrink:0;}

.btn-switch{
padding:5px 12px;
font-size:12px;
font-weight:500;
background:#6366f1;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
transition:background .15s;
}
.btn-switch:hover{background:#4f46e5;}
.btn-switch:disabled{background:#3730a3;cursor:default;}

.btn-del{
padding:5px 9px;
font-size:12px;
background:rgba(239,68,68,.15);
color:#f87171;
border:1px solid rgba(239,68,68,.2);
border-radius:6px;
cursor:pointer;
transition:background .15s;
}
.btn-del:hover{background:rgba(239,68,68,.25);}
.btn-del:disabled{opacity:.5;cursor:default;}

.empty{color:#475569;font-size:13px;padding:8px 0;}

</style>
</head>
<body>

<div class="wrapper">

  <!-- Login form -->
  <div class="card">
    <h1>Login</h1>
    <form id="loginForm">
      <input id="username" placeholder="Username" autocomplete="username" required>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" required>
      <button type="submit" class="btn" id="loginBtn">Login</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

  <!-- Sessions panel -->
  <div class="sessions-panel">
    <div class="panel-title">Active Sessions</div>
    <div id="sessionsList"><p class="empty">Loading…</p></div>
  </div>

</div>

<script>

function fmt(ts) {
  if (!ts) return '—';
  const sec = Math.round(Date.now() / 1000 - ts);
  if (sec < 60)    return sec + 's ago';
  if (sec < 3600)  return Math.floor(sec / 60) + 'm ago';
  if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
  return Math.floor(sec / 86400) + 'd ago';
}

function fmtExpiry(ts) {
  if (!ts) return '—';
  const sec = Math.round(ts - Date.now() / 1000);
  if (sec <= 0) return 'expired';
  if (sec < 3600)  return 'in ' + Math.floor(sec / 60) + 'm';
  if (sec < 86400) return 'in ' + Math.floor(sec / 3600) + 'h';
  return 'in ' + Math.floor(sec / 86400) + 'd';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadSessions() {
  const list = document.getElementById('sessionsList');
  try {
    const res = await fetch('/sessions');
    const sessions = await res.json();
    if (!sessions.length) {
      list.innerHTML = '<p class="empty">No active sessions</p>';
      return;
    }
    list.innerHTML = '';
    sessions.forEach(s => {
      const el = document.createElement('div');
      el.className = 'session';
      el.innerHTML = `
        <div class="avatar">${esc(s.username[0].toUpperCase())}</div>
        <div class="session-info">
          <div class="session-user">${esc(s.username)}</div>
          <div class="session-times">
            Last active: ${fmt(s.last_access_time)} &nbsp;·&nbsp; Expires: ${fmtExpiry(s.expiry_time)}
          </div>
        </div>
        <div class="session-btns">
          <button class="btn-switch" data-id="${esc(s.session_id)}">Switch</button>
          <button class="btn-del"    data-id="${esc(s.session_id)}" title="Delete session">✕</button>
        </div>`;
      list.appendChild(el);
    });

    list.querySelectorAll('.btn-switch').forEach(b =>
      b.addEventListener('click', () => switchSession(b.dataset.id, b)));
    list.querySelectorAll('.btn-del').forEach(b =>
      b.addEventListener('click', () => deleteSession(b.dataset.id, b)));
  } catch {
    list.innerHTML = '<p class="empty">Failed to load sessions</p>';
  }
}

async function switchSession(id, btn) {
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const res = await fetch('/sessions/switch/' + id, { method: 'POST' });
    if (res.ok) {
      window.location.href = '/dashboard.html';
    } else {
      btn.disabled = false;
      btn.textContent = 'Switch';
    }
  } catch {
    btn.disabled = false;
    btn.textContent = 'Switch';
  }
}

async function deleteSession(id, btn) {
  btn.disabled = true;
  try {
    const res = await fetch('/sessions/' + id, { method: 'DELETE' });
    if (res.ok) loadSessions();
    else btn.disabled = false;
  } catch {
    btn.disabled = false;
  }
}

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('msg');
  msg.className = 'msg';
  msg.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Logging in…';
  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    if (res.ok) {
      window.location.href = '/dashboard.html';
    } else {
      const d = await res.json().catch(() => ({}));
      msg.className = 'msg error';
      msg.textContent = d.error || 'Login failed';
    }
  } catch {
    msg.className = 'msg error';
    msg.textContent = 'Connection error';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Login';
  }
});

loadSessions();

</script>
</body>
</html>
