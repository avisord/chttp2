<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}

body{

height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
radial-gradient(circle at 20% 20%, #1e293b 0%, transparent 40%),
radial-gradient(circle at 80% 80%, #312e81 0%, transparent 40%),
#020617;

color:white;
}

.card{

width:420px;
padding:35px;

border-radius:14px;

background:rgba(30,41,59,0.75);
backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.05);

box-shadow:0 20px 60px rgba(0,0,0,0.7);

}

h1{
text-align:center;
margin-bottom:25px;
font-size:26px;
}

.info{
margin-bottom:20px;
}

.row{

display:flex;
justify-content:space-between;

padding:10px 0;

border-bottom:1px solid #334155;

}

.key{
color:#94a3b8;
}

.value{
font-weight:500;
}

button{

margin-top:20px;

width:100%;
padding:14px;

border:none;
border-radius:8px;

background:#ef4444;
color:white;

font-weight:600;

cursor:pointer;

}

button:hover{
background:#dc2626;
}

.status{

margin-top:10px;
text-align:center;
font-size:14px;
color:#94a3b8;

}

</style>
</head>

<body>

<div class="card">

<h1>Dashboard</h1>

<div id="userInfo" class="info">
Loading user info...
</div>

<button id="logoutBtn">Logout</button>

<div class="status" id="status"></div>

</div>

<script>

async function loadUser(){

try{

const res = await fetch("/whoami",{
credentials:"include"
});

if(!res.ok){
window.location="/login.html";
return;
}

const data = await res.json();

const container = document.getElementById("userInfo");

container.innerHTML = "";

for(const key in data){

const row = document.createElement("div");
row.className = "row";

row.innerHTML = `
<div class="key">${key}</div>
<div class="value">${data[key]}</div>
`;

container.appendChild(row);

}

}catch(err){

document.getElementById("userInfo").innerText = "Failed to load user info";

}

}

loadUser();

/* logout */

document.getElementById("logoutBtn").onclick = async () => {

const status = document.getElementById("status");

status.textContent = "Logging out...";

try{

const res = await fetch("/logout",{

method:"DELETE",
credentials:"include"

});

if(res.ok){
window.location="/login.html";
}else{
status.textContent="Logout failed";
}

}catch(err){

status.textContent="Connection error";

}

};

</script>

</body>
</html>
