<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>File Upload</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    .container {
      max-width: 500px;
    }

    input,
    button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
    }

    pre {
      margin-top: 20px;
      padding: 10px;
      background: #f4f4f4;
      overflow: auto;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>Upload File</h2>

    <label>Destination Path</label>
    <input type="text" id="path" value="./chttp2" />

    <label>Select File</label>
    <input type="file" id="fileInput" />

    <button onclick="uploadFile()">Upload</button>

    <pre id="output"></pre>

  </div>

  <script>

    async function uploadFile() {

      const fileInput = document.getElementById("fileInput");
      const path = document.getElementById("path").value;
      const output = document.getElementById("output");

      if (fileInput.files.length === 0) {
        output.textContent = "Please select a file.";
        return;
      }

      const file = fileInput.files[0];

      const form = new FormData();
      form.append("file", file);

      try {

        const response = await fetch(
          "http://localhost:8080/fs/upload?path=" + encodeURIComponent(path),
          {
            method: "POST",
            credentials: "include",
            body: form
          }
        );

        const text = await response.text();

        output.textContent =
          "HTTP Status: " + response.status + "\n\n" + text;

      } catch (err) {
        output.textContent = "Upload failed:\n" + err;
      }

    }

  </script>

</body>

</html>
